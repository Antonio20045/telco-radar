name: Telco Radar Run

on:
  schedule:
    - cron: "0 5 * * 1"   # every Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Only consider items newer than N days"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && secrets.ANTHROPIC_API_KEY || secrets.ANTHROPIC }}
          PYTHONPATH: src
        run: |
          python -m telco_radar.pipeline --root . \
            --lookback-days "${{ github.event.inputs.lookback_days || 8 }}"

      - name: Commit state, report and site
        run: |
          git config user.name "telco-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ site/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "radar: run $(date -u +%F)"
            git push
          fi

      - name: Trigger Render deploy
        if: always()
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK" > /dev/null && echo "Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK not set - skipping (Render auto-deploys on push if connected)"
          fi
