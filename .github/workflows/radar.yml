name: Telco Radar Run

on:
  schedule:
    # Start early enough that the report is normally live before midday in
    # Germany, even when GitHub delays a scheduled run or NVIDIA is busy.
    - cron: "30 8 * * 2,5" # every Tuesday and Friday 08:30 UTC (~10:30 DE summer / 09:30 winter)
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Only consider items newer than N days"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          # If MOONSHOT_API_KEY is set, the pipeline uses Moonshot/Kimi
          # (OpenAI-compatible) automatically; otherwise it falls back to Anthropic.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && secrets.ANTHROPIC_API_KEY || secrets.ANTHROPIC }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PYTHONPATH: src
        run: |
          set -o pipefail
          python -m telco_radar.pipeline --root . \
            --lookback-days "${{ github.event.inputs.lookback_days || 8 }}" \
            2>&1 | tee pipeline.log

      - name: Expose pipeline failure details
        if: failure()
        run: |
          {
            echo "### Telco Radar pipeline failure"
            echo
            echo '```text'
            tail -300 pipeline.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pipeline log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: telco-radar-pipeline-log-${{ github.run_id }}
          path: pipeline.log
          if-no-files-found: warn

      - name: Commit state, report and site
        run: |
          git config user.name "telco-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ site/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "radar: run $(date -u +%F)"
            # Rebase onto any commits pushed while the run was in flight, then push.
            pushed=0
            for attempt in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then
                echo "pushed"
                pushed=1
                break
              fi
              git rebase --abort || true
              echo "push rejected (attempt $attempt) - retrying"; sleep 5
            done
            if [ "$pushed" -ne 1 ]; then
              echo "Could not push the completed report; refusing to deploy stale content."
              exit 1
            fi
          fi

      - name: Trigger Render deploy
        if: success()
        continue-on-error: true   # a transient Render hiccup must not red-fail the run
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set - skipping"; exit 0
          fi
          sleep 15  # let the git push propagate before Render clones
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then
              echo "Render deploy triggered (HTTP $code)"; exit 0
            fi
            echo "Render hook returned HTTP $code (attempt $attempt/5) - retrying in 30s"
            sleep 30
          done
          echo "Render hook still failing - latest commit is pushed; Render will pick it up on its next deploy"
