name: Telco Radar Run

on:
  schedule:
    - cron: "0 5 * * 1"   # every Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Only consider items newer than N days"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # If MOONSHOT_API_KEY is set, the pipeline uses Moonshot/Kimi
          # (OpenAI-compatible) automatically; otherwise it falls back to Anthropic.
          LLM_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && secrets.ANTHROPIC_API_KEY || secrets.ANTHROPIC }}
          PYTHONPATH: src
        run: |
          python -m telco_radar.pipeline --root . \
            --lookback-days "${{ github.event.inputs.lookback_days || 8 }}"

      - name: Commit state, report and site
        run: |
          git config user.name "telco-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ site/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "radar: run $(date -u +%F)"
            git push
          fi

      - name: Trigger Render deploy
        if: always()
        continue-on-error: true   # a transient Render hiccup must not red-fail the run
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set - skipping"; exit 0
          fi
          sleep 15  # let the git push propagate before Render clones
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then
              echo "Render deploy triggered (HTTP $code)"; exit 0
            fi
            echo "Render hook returned HTTP $code (attempt $attempt/5) - retrying in 30s"
            sleep 30
          done
          echo "Render hook still failing - latest commit is pushed; Render will pick it up on its next deploy"
