name: Deploy Site
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then echo "RENDER_DEPLOY_HOOK not set"; exit 1; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
          echo "Render deploy hook -> HTTP $code"
          [ "$code" = "200" ] || [ "$code" = "201" ]
