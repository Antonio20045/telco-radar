# =============================================================================
# TELCO RADAR - Watchlist
# =============================================================================
# Regions -> Operators -> Sources.
#
# Source types:
#   rss      : RSS/Atom feed (preferred - has publish dates)
#   newsroom : HTML press/newsroom page (generic link extraction; optional
#              CSS "item_selector" to narrow down article links)
#
# Operators WITHOUT sources are intentional: their newsrooms are bot-protected
# or JS-only. They are still covered - industry-news items mentioning them
# (name or alias in the headline) are auto-tagged to their region.
#
# Maintenance: `python scripts/validate_sources.py` checks every URL.
# A failing source is logged and skipped at runtime - it never breaks a run.
# =============================================================================

