# =============================================================================
# TELCO RADAR - Watchlist
# =============================================================================
# Regions -> Operators -> Sources.
#
# Source types:
#   rss      : RSS/Atom feed (preferred - has publish dates)
#   newsroom : HTML press/newsroom page (generic link extraction; optional
#              CSS "item_selector" to narrow down article links)
#
# Maintenance: run `python scripts/validate_sources.py` to check all URLs.
# Broken sources are logged and skipped at runtime - they never break a run.
# =============================================================================

regions:
  europe:
    name: "Europa"
    operators:
      - name: "Vodafone Group"
        aliases: ["Vodafone"]
        country: "GB"
        sources:
          - type: newsroom
            url: "https://www.vodafone.com/news"
      - name: "Deutsche Telekom"
        aliases: ["Telekom", "T-Mobile", "T-Systems"]
        country: "DE"
        sources:
