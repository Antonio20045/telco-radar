# =============================================================================
# TELCO RADAR - Industry news sources (second signal layer)
# =============================================================================
# Global telco trade press. Items are auto-tagged to a region when an
# operator from the watchlist is mentioned in the headline; otherwise "Global".
# RSS preferred: entries carry publish dates -> clean freshness filtering.
# Every feed here is validated (scripts/validate_sources.py).
# =============================================================================

